plugins {
    id 'application'
    id 'org.openjfx.javafxplugin' version '0.1.0'
}

group = 'com.trace'
version = '0.0.1'

repositories {
    mavenCentral()
}

dependencies {
    implementation 'com.fasterxml.jackson.core:jackson-databind:2.17.1'
}

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(21)
    }
}

javafx {
    version = '21'
    modules = ['javafx.controls', 'javafx.graphics']
}

application {
    mainClass = 'com.trace.App'
}

sourceSets {
    main {
        java {
            srcDirs = ['src']
        }
        resources {
            srcDirs = ['src/resources']
        }
    }
}

tasks.withType(JavaCompile) {
    options.encoding = 'UTF-8'
}

tasks.register('generateVersionResource') {
    def outFile = layout.buildDirectory.file('generated/resources/version.properties')
    outputs.file(outFile)
    inputs.property('version', project.version)
    doLast {
        def f = outFile.get().asFile
        f.parentFile.mkdirs()
        f.text = "version=${project.version}\n"
    }
}

sourceSets.main.resources.srcDir(tasks.named('generateVersionResource').map { it.outputs.files.singleFile.parentFile })
processResources.dependsOn('generateVersionResource')

tasks.register('buildDemo', JavaExec) {
    group = 'application'
    description = 'Generates demo_circuit.trc'
    classpath = sourceSets.main.runtimeClasspath
    mainClass = 'com.trace.DemoBuilder'
}

tasks.register('buildIcDemo', JavaExec) {
    group = 'application'
    description = 'Generates demo_and_gate.trc'
    classpath = sourceSets.main.runtimeClasspath
    mainClass = 'com.trace.DemoIcBuilder'
}

tasks.register('buildExe', Exec) {
    group = 'distribution'
    description = 'Packages the application as a Windows .exe using jpackage'
    dependsOn 'installDist'

    def jpackageDir = layout.buildDirectory.dir('jpackage')
    def installDir = layout.buildDirectory.dir('install/Trace/lib')
    def javaHome = javaToolchains.launcherFor(java.toolchain).get().metadata.installationPath.asFile.absolutePath

    doFirst {
        delete jpackageDir
    }

    executable = "${javaHome}/bin/jpackage"
    args = [
        '--type', 'exe',
        '--name', 'Trace',
        '--app-version', "${project.version}",
        '--input', installDir.get().asFile.absolutePath,
        '--main-jar', "Trace-${project.version}.jar",
        '--main-class', 'com.trace.Launcher',
        '--dest', jpackageDir.get().asFile.absolutePath,
        '--icon', file('src/resources/icons/icon.ico').absolutePath,
        '--java-options', '--module-path=$APPDIR',
        '--java-options', '--add-modules=javafx.controls,javafx.graphics',
        '--win-shortcut',
        '--win-menu',
    ]
}
